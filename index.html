<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="F ormulário de login moderno e responsivo com design elegante.">
    <link rel="shortcut icon" href="img/icons9.png" type="image/x-icon">
    <title>Login Form Design</title>
</head>
<body>
    <div class="wrapper">
        <div class="title">Login Form</div>
        <form action="#">
            <div class="field">
                <input type="text" required>
                <label>Endereço de email</label>
            </div>
            <div class="field">
                <input type="password" required>
                <label>Senha</label>
            </div>
            <div class="pass-link"><a href="#">Esqueceu sua senha?</a></div>
             <div class="field">
                <input type="submit" value="Login">
            </div>
            <div class="signup-link">Não é um membro? <a href="#">Inscreva-se</a></div>
        </form>
    </div>
</body>
</html>
